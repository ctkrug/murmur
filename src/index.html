<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Murmur · boids flocking simulation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="layout">
      <canvas id="canvas" width="800" height="600"></canvas>

      <aside class="panel">
        <header class="panel-header">
          <h1 class="wordmark">
            <svg class="wordmark-mark" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true">
              <path d="M1 1 L11 6 L1 11 L4 6 Z" />
            </svg>
            <span class="wordmark-name">Murmur</span>
            <span class="wordmark-sub">boids flocking</span>
          </h1>
          <a
            class="github-link"
            href="https://github.com/ctkrug/boids-playground"
            target="_blank"
            rel="noopener"
            >View on GitHub</a
          >
        </header>

        <section class="panel-group">
          <h2>Presets</h2>

          <label class="control">
            Apply a preset
            <select id="presetSelect">
              <option value="">Choose a preset…</option>
            </select>
          </label>
        </section>

        <section class="panel-group">
          <h2>Rules</h2>

          <label class="control">
            Perception radius
            <input type="range" id="perceptionRadius" min="10" max="150" step="1" />
            <output id="perceptionRadiusValue"></output>
          </label>

          <label class="control">
            Max speed
            <input type="range" id="maxSpeed" min="0.5" max="10" step="0.1" />
            <output id="maxSpeedValue"></output>
          </label>

          <label class="control">
            Max force
            <input type="range" id="maxForce" min="0.01" max="1" step="0.01" />
            <output id="maxForceValue"></output>
          </label>

          <label class="control">
            Separation weight
            <input type="range" id="separationWeight" min="0" max="3" step="0.1" />
            <output id="separationWeightValue"></output>
          </label>

          <label class="control">
            Alignment weight
            <input type="range" id="alignmentWeight" min="0" max="3" step="0.1" />
            <output id="alignmentWeightValue"></output>
          </label>

          <label class="control">
            Cohesion weight
            <input type="range" id="cohesionWeight" min="0" max="3" step="0.1" />
            <output id="cohesionWeightValue"></output>
          </label>
        </section>

        <section class="panel-group">
          <h2>Flock</h2>

          <label class="control">
            Flock size
            <input type="range" id="flockSize" min="10" max="400" step="10" />
            <output id="flockSizeValue"></output>
          </label>

          <label class="control control-checkbox">
            <input type="checkbox" id="wrapToggle" />
            Wrap around edges
          </label>
        </section>

        <section class="panel-group">
          <h2>Pointer</h2>

          <label class="control">
            Mode
            <select id="pointerMode">
              <option value="off">Off</option>
              <option value="attract" selected>Attract</option>
              <option value="repel">Repel</option>
            </select>
          </label>

          <label class="control">
            Pointer strength
            <input type="range" id="pointerWeight" min="0" max="0.5" step="0.01" />
            <output id="pointerWeightValue"></output>
          </label>
        </section>

        <section class="panel-group">
          <h2>Display</h2>

          <label class="control control-checkbox">
            <input type="checkbox" id="debugOverlay" />
            Show debug overlay
          </label>
        </section>

        <section class="panel-group">
          <h2>Obstacles</h2>
          <p class="panel-hint">Click the canvas to drop an obstacle.</p>

          <label class="control">
            Avoidance strength
            <input type="range" id="obstacleWeight" min="0" max="10" step="0.1" />
            <output id="obstacleWeightValue"></output>
          </label>

          <button type="button" id="clearObstaclesBtn">Clear obstacles</button>
        </section>

        <section class="panel-group panel-buttons">
          <button type="button" id="pauseBtn">Pause</button>
          <button type="button" id="stepBtn">Step</button>
          <button type="button" id="resetBtn">Reset</button>
        </section>

        <section class="panel-group panel-readout">
          <span><strong id="fpsReadout">0</strong> fps</span>
          <span><strong id="countReadout">0</strong> boids</span>
          <span><strong id="obstacleReadout">0</strong> obstacles</span>
        </section>
      </aside>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
